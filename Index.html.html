  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Expose Firebase helpers to window so React app can use them
  window._fbSet = (path, value) => set(ref(db, path), value);
  window._fbRemove = (path) => remove(ref(db, path));
  window._fbListen = (path, cb) => onValue(ref(db, path), snap => cb(snap.val()));
  window._fbReady = true;

  // Signal app to start once Firebase is ready
  document.dispatchEvent(new Event('firebase-ready'));
</script>

// ── Background canvas ──
(function drawBG() {
  const canvas = document.getElementById("bg-canvas");
  function render() {
    const W = window.innerWidth, H = window.innerHeight;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,W,H);
    const blobs = [
      {x:W*0.92,y:H*0.06,r:220,c:"#0033CC"},
      {x:W*0.04,y:H*0.18,r:140,c:"#0055FF"},
      {x:W*0.88,y:H*0.55,r:120,c:"#0033CC"},
      {x:W*0.06,y:H*0.8, r:110,c:"#0055FF"},
      {x:W*0.5, y:H*0.97,r:170,c:"#003399"},
    ];
    blobs.forEach(({x,y,r,c})=>{
      const g=ctx.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,c+"20"); g.addColorStop(1,c+"00");
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    });
    for(let gx=28;gx<W;gx+=30){
      for(let gy=28;gy<H;gy+=30){
        ctx.beginPath(); ctx.arc(gx,gy,1.1,0,Math.PI*2);
        ctx.fillStyle="rgba(0,51,204,0.04)"; ctx.fill();
      }
    }
    ctx.save(); ctx.globalAlpha=0.04; ctx.strokeStyle="#0033CC"; ctx.lineWidth=1;
    for(let i=0;i<9;i++){const o=W*0.7+i*18;ctx.beginPath();ctx.moveTo(o,0);ctx.lineTo(o+130,130);ctx.stroke();}
    ctx.restore();
    ctx.save(); ctx.globalAlpha=0.04; ctx.strokeStyle="#0033CC"; ctx.lineWidth=1.5;
    for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(-20,H+20,110+i*38,Math.PI*1.35,Math.PI*1.92);ctx.stroke();}
    ctx.restore();
  }
  render();
  window.addEventListener("resize", render);
})();

// ── Firebase Realtime Database Storage (live sync for all teammates) ──
window._fbCallbacks = {};
window.storage = {
  get: async function(key) {
    // Data is pushed via onValue listener; return cached value
    return window._fbCache && window._fbCache[key] ? {value: window._fbCache[key]} : null;
  },
  set: async function(key, value) {
    const path = "attendance/" + key.replace(/[.#$\[\]]/g, "_");
    if (window._fbSet) {
      try { await window._fbSet(path, value); } catch(e) { console.error("FB set error", e); }
    }
    if (!window._fbCache) window._fbCache = {};
    window._fbCache[key] = value;
    return {key, value};
  },
  delete: async function(key) {
    const path = "attendance/" + key.replace(/[.#$\[\]]/g, "_");
    if (window._fbRemove) {
      try { await window._fbRemove(path); } catch(e) { console.error("FB remove error", e); }
    }
    if (window._fbCache) delete window._fbCache[key];
    return {key, deleted: true};
  },
  listenAll: function(cb) {
    // Called by app to get live updates from Firebase
    if (window._fbListen) {
      window._fbListen("attendance", cb);
    }
  }
};

function App(){
  const today=new Date();
  const [vy,setVy]=useState(today.getFullYear());
  const [vm,setVm]=useState(today.getMonth());
  const [data,setData]=useState({});
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [lastSync,setLastSync]=useState(null);

  const [search,setSearch]=useState("");
  const [sel,setSel]=useState(null);
  const [note,setNote]=useState("");
  const [tab,setTab]=useState("dashboard");
  const KEY="ww-attendance-v2";

  const saveData=useCallback(async(nd)=>{
    setSaving(true);
    try{
      await window.storage.set(KEY, JSON.stringify(nd));
      setLastSync(new Date());
      setNote("Saved ✓");
      setTimeout(()=>setNote(""),1800);
    } catch(e){setNote("Error saving");}
    setSaving(false);
  },[]);

  useEffect(()=>{
    // Listen for real-time Firebase updates
    const startListening = () => {
      window.storage.listenAll((fbData) => {
        if (fbData && fbData[KEY]) {
          try {
            setData(JSON.parse(fbData[KEY]));
            setLastSync(new Date());
          } catch(e) {}
        } else if (fbData === null) {
          setData({});
          setLastSync(new Date());
        }
        setLoading(false);
      });
    };

    if (window._fbReady) {
      startListening();
    } else {
      document.addEventListener('firebase-ready', startListening, {once: true});
      // Fallback: if Firebase takes too long, stop loading spinner
      setTimeout(() => setLoading(false), 4000);
    }
  },[]);

  const getCK=(name,y,m,d)=>`${name}::${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const getCode=(name,d)=>data[getCK(name,vy,vm,d)]||null;

  const applyCode=(code)=>{
    if(!sel)return;
    const k=getCK(sel.name,vy,vm,sel.day);
    const nd={...data};
    if(nd[k]===code)delete nd[k];else nd[k]=code;
    setData(nd);saveData(nd);
    setSel(prev=>prev?{...prev,code:nd[k]||null}:null);
  };

  const days=Array.from({length:getDays(vy,vm)},(_,i)=>i+1);
  const prevM=()=>{if(vm===0){setVy(y=>y-1);setVm(11);}else setVm(m=>m-1);};
  const nextM=()=>{if(vm===11){setVy(y=>y+1);setVm(0);}else setVm(m=>m+1);};
  const filtered=TEAM_MEMBERS.filter(m=>(filter==="All"||m.region===filter)&&m.name.toLowerCase().includes(search.toLowerCase()));

  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
  const oooToday=TEAM_MEMBERS.filter(m=>["V","S","M"].includes(data[`${m.name}::${todayStr}`]||"")).length;
  const holidayToday=TEAM_MEMBERS.filter(m=>(data[`${m.name}::${todayStr}`]||"")==="H").length;
  const wfhToday=TEAM_MEMBERS.filter(m=>(data[`${m.name}::${todayStr}`]||"")==="W").length;
  const monthOOO=TEAM_MEMBERS.reduce((s,m)=>s+days.filter(d=>["V","S","M"].includes(getCode(m.name,d))).length,0);

  );

  const Tracker=()=>h("div",null,
    h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"10px 18px",borderBottom:"0.5px solid #dde",flexWrap:"wrap",background:"rgba(255,255,255,0.75)"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:6}},
        h("button",{onClick:prevM,style:{padding:"4px 10px",borderRadius:6,border:"0.5px solid #ccd",background:"transparent",color:"#333",fontSize:"13px"}},"←"),
        h("span",{style:{fontWeight:500,fontSize:"14px",minWidth:145,textAlign:"center",color:"#222"}},FULL_MONTHS[vm]+" "+vy),
        h("button",{onClick:nextM,style:{padding:"4px 10px",borderRadius:6,border:"0.5px solid #ccd",background:"transparent",color:"#333",fontSize:"13px"}},"→")
      ),
      h("div",{style:{display:"flex",gap:3}},
        ["All","AMS","APJ","EMEA"].map(r=>
          h("button",{key:r,onClick:()=>setFilter(r),style:{padding:"3px 9px",fontSize:"11px",borderRadius:6,border:filter===r?"1.5px solid #0033CC":"0.5px solid #ccd",background:filter===r?"#0033CC":"transparent",color:filter===r?"white":"#666",fontWeight:filter===r?600:400}},r)
        )
      ),
      h("input",{type:"text",placeholder:"Search member...",value:search,onChange:e=>setSearch(e.target.value),style:{padding:"4px 10px",fontSize:"12px",borderRadius:6,border:"0.5px solid #ccd",background:"#f8f9ff",color:"#222",width:140}})
    ),
    h("div",{style:{display:"flex",gap:10,padding:"6px 18px",flexWrap:"wrap",borderBottom:"0.5px solid #dde",background:"rgba(255,255,255,0.65)"}},
      CODES.map(c=>h("div",{key:c.code,style:{display:"flex",alignItems:"center",gap:4}},
        h("span",{style:{width:17,height:17,borderRadius:3,background:c.bg,border:`1.5px solid ${c.color}`,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:"9px",fontWeight:700,color:c.color}},c.code),
        h("span",{style:{fontSize:"11px",color:"#666"}},c.label)
      ))
    ),
    sel&&h("div",{style:{padding:"8px 18px",background:"rgba(0,51,204,0.05)",borderBottom:"0.5px solid rgba(0,51,204,0.2)",borderLeft:"3px solid #0033CC",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}},
      h("span",{style:{fontSize:"11px",color:"#555",fontWeight:500}},sel.name+" · "+sel.dayKey),
      CODES.map(c=>h("button",{key:c.code,onClick:()=>applyCode(c.code),style:{padding:"3px 10px",fontSize:"11px",fontWeight:500,borderRadius:6,border:`1.5px solid ${c.color}`,background:sel.code===c.code?c.bg:"transparent",color:c.color,cursor:"pointer"}},c.code+" – "+c.label)),
      sel.code&&h("button",{onClick:async()=>{const nd={...data};delete nd[getCK(sel.name,vy,vm,sel.day)];setData(nd);await saveData(nd);setSel(null);},style:{padding:"3px 9px",fontSize:"11px",borderRadius:6,border:"0.5px solid #ccd",background:"transparent",color:"#666",cursor:"pointer"}},"Clear"),
      h("button",{onClick:()=>setSel(null),style:{marginLeft:"auto",padding:"3px 8px",fontSize:"11px",borderRadius:6,border:"0.5px solid #ccd",background:"transparent",color:"#aaa",cursor:"pointer"}},"✕")
    ),
    h("div",{style:{overflowX:"auto",background:"rgba(255,255,255,0.5)"}},
      h("table",{style:{borderCollapse:"collapse",width:"100%"}},
        h("thead",null,h("tr",null,
          h("th",{style:{position:"sticky",left:0,background:"rgba(255,255,255,0.97)",zIndex:2,padding:"5px 12px",textAlign:"left",fontWeight:500,fontSize:"11px",color:"#888",borderBottom:"0.5px solid #dde",minWidth:175,whiteSpace:"nowrap"}},"Member"),
          ...days.map(d=>{
            const wd=getWd(vy,vm,d);
            const isWe=wd===0||wd===6;
            const isTdy=vy===today.getFullYear()&&vm===today.getMonth()&&d===today.getDate();
            return h("th",{key:d,style:{padding:"3px 1px",minWidth:25,width:25,textAlign:"center",fontSize:"10px",fontWeight:isTdy?700:400,color:isTdy?"#0033CC":isWe?"#ccc":"#888",background:isTdy?"rgba(0,51,204,0.1)":"rgba(255,255,255,0.9)",borderBottom:"0.5px solid #dde"}},
              h("div",null,d),h("div",{style:{fontSize:"8px",opacity:0.6}},WEEKDAYS[wd])
            );
          }),
          h("th",{style:{padding:"5px 8px",textAlign:"center",fontSize:"11px",fontWeight:500,color:"#888",borderBottom:"0.5px solid #dde",minWidth:90,whiteSpace:"nowrap",background:"rgba(255,255,255,0.9)"}},"Summary")
        )),
        h("tbody",null,
          filtered.map((member,idx)=>{
            const stats={};CODES.forEach(c=>{stats[c.code]=0;});
            days.forEach(d=>{const c=getCode(member.name,d);if(c&&stats[c]!==undefined)stats[c]++;});
            const rowBg=idx%2===0?"rgba(255,255,255,0.5)":"rgba(0,51,204,0.025)";
            return h("tr",{key:member.name},
              h("td",{style:{position:"sticky",left:0,zIndex:1,background:idx%2===0?"rgba(255,255,255,0.97)":"rgba(247,249,255,0.97)",padding:"4px 12px",borderBottom:"0.5px solid #eef",whiteSpace:"nowrap"}},
                h("div",{style:{fontSize:"12px",color:"#222",fontWeight:500}},member.name),
                h("div",{style:{fontSize:"10px",color:"#aaa"}},member.region+" · "+member.country)
              ),
              ...days.map(d=>{
                const wd=getWd(vy,vm,d);
                const isWe=wd===0||wd===6;
                const dayKey=`${vy}-${String(vm+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
                const code=getCode(member.name,d);
                const ci=code?CODE_MAP[code]:null;
                const isSel=sel?.name===member.name&&sel?.day===d;
                return h("td",{key:d,onClick:()=>setSel({name:member.name,day:d,dayKey,code}),style:{padding:"2px 1px",textAlign:"center",background:isSel?"rgba(0,51,204,0.13)":isWe?"rgba(0,51,204,0.03)":rowBg,borderBottom:"0.5px solid #eef",cursor:"pointer",width:25}},
                  code&&ci?h("span",{style:{display:"inline-flex",alignItems:"center",justifyContent:"center",width:19,height:19,borderRadius:3,background:ci.bg,color:ci.color,fontSize:"9px",fontWeight:700,border:`1px solid ${ci.color}60`}},code)
                  :h("span",{style:{display:"inline-block",width:19,height:19}})
                );
              }),
              h("td",{style:{padding:"3px 8px",borderBottom:"0.5px solid #eef",background:rowBg}},
                h("div",{style:{display:"flex",gap:2,justifyContent:"center",flexWrap:"wrap"}},
                  CODES.map(c=>stats[c.code]>0?h("span",{key:c.code,style:{fontSize:"9px",padding:"1px 4px",borderRadius:3,background:c.bg,color:c.color,fontWeight:700,border:`1px solid ${c.color}50`}},c.code+":"+stats[c.code]):null)
                )
              )
            );
          })
        )
      )
    ),
    h("div",{style:{padding:"8px 18px",borderTop:"0.5px solid #dde",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",background:"rgba(0,30,150,0.04)"}},
      regionData.map(({r,count,ooo})=>h("div",{key:r,style:{background:"rgba(255,255,255,0.88)",borderRadius:8,padding:"5px 10px",border:"0.5px solid rgba(0,51,204,0.12)"}},
        h("div",{style:{fontWeight:600,fontSize:"11px",color:"#0033CC"}},r),
        h("div",{style:{fontSize:"10px",color:"#666"}},count+" members · "+ooo+" OOO days")
      )),
      h("div",{style:{marginLeft:"auto",fontSize:"11px",color:"#aaa"}},"Click any cell to set code · 🔥 Live sync via Firebase — all teammates see changes instantly")
    )
  );

  return h("div",{style:{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",fontSize:"13px",position:"relative"}},
    note&&h("div",{style:{position:"fixed",top:14,right:14,zIndex:999,background:"#0033CC",color:"white",padding:"7px 16px",borderRadius:8,fontSize:"12px",fontWeight:500,boxShadow:"0 2px 12px rgba(0,51,204,0.3)"}},note),
    React.createElement(Header),
    React.createElement(TabNav),
    tab==="dashboard"?React.createElement(Dashboard):React.createElement(Tracker)
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
